version: "3.9"

services:
  smartfarming:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartfarming_app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./database:/app/database
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: smartfarming_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - smartfarming
    restart: unless-stopped
    profiles:
      - production

volumes:
  uploads:
  reports:
  database:
